78c92fac7aa8fdd8.js" nomodule=""></script></head><body><noscript><iframe title="Google Tag Manager noscript iframe" src="https://www.googletagmanager.com/ns.html?id=GTM-MXHZX3PF" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript><a href="#main-content" class="sr-only focus:not-sr-only focus:fixed focus:top-4 focus:left-4 focus:z-[9999] focus:rounded focus:bg-white focus:px-4 focus:py-2 focus:text-black focus:shadow-lg focus:outline-2 focus:outline-black">Skip to main content</a><script type="application/ld+json">{"@context":"https://schema.org","@type":"Organization","name":"Lemonn","url":"https://lemonn.co.in/","logo":"https://lemonn.co.in/icons/stocks/lemonn.svg","description":"Invest in stocks, MF, F&Os & IPOs. Lemonn's zero-commission trading platform makes it easy to grow your wealth. TRADE NOW!!","founder":["Ashish Singhal","Vimal Sagar Tiwari","Govind Soni"],"foundingDate":"2024","foundingLocation":"Mumbai, Maharashtra, India","address":{"@type":"PostalAddress","streetAddress":"Galaxy, Unit No. 603, A Wing, Everest Grand, Mahakali Caves Road, Opp. Ahura Centre, Andheri East, Chakala Midc","addressLocality":"Mumbai","addressRegion":"Maharashtra","postalCode":"400093","addressCountry":"IN"},"contactPoint":[{"@type":"ContactPoint","telephone":"+918035769929","contactType":"customer service","areaServed":"IN","availableLanguage":["English","Hindi"]}],"sameAs":["https://x.com/LemonnHQ","https://www.instagram.com/lemonnhq/","https://www.youtube.com/@LemonnHQ","https://www.facebook.com/lemonnhq/","https://www.linkedin.com/company/lemonnhq/"]}</script><script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What are stocks?","acceptedAnswer":{"@type":"Answer","text":"Stocks, also known as shares or equities, represent ownership in a company. When you buy stocks of a company, you become a shareholder, which means you own a tiny piece of that company."}},{"@type":"Question","name":"Why do stock prices go up and down?","acceptedAnswer":{"@type":"Answer","text":"Stock prices move based on a variety of factors. Positive news about a company, industry, or the economy can boost prices. Negative news or uncertain events can cause prices to drop. Additionally, supply and demand play a role; if more people want to buy a stock, its price will rise and vice versa."}},{"@type":"Question","name":"Why do stock prices go up and down?","acceptedAnswer":{"@type":"Answer","text":"Sensex and Nifty are two popular stock market indices in India. Sensex tracks the performance of 30 large and well-established companies, while Nifty tracks the performance of 50 such companies. These indices give us a bird’s eye view of the stock market’s performance."}},{"@type":"Question","name":"Is investing in stocks risky?","acceptedAnswer":{"@type":"Answer","text":"Yes, investing in stocks comes with risks. Stock prices can be volatile. There is a chance of losing money, especially in the short term. However, historically, the stock market tends to provide higher returns over the long term when compared to other investment options."}},{"@type":"Question","name":"How do I choose which stocks to buy?","acceptedAnswer":{"@type":"Answer","text":"Do your research! A few factors to monitor could include: a company's financial health, its management, its products or services, and its competition. It's also a good idea to diversify your investments by buying stocks from different industries, so if one industry faces a setback, your entire investment won't be affected."}},{"@type":"Question","name":"What is a dividend?","acceptedAnswer":{"@type":"Answer","text":"A dividend is a portion of a company's profits paid to its shareholders. Not all companies pay dividends, but those that do often distribute them regularly, such as quarterly or annually."}},{"@type":"Question","name":"How long should I hold onto my stocks?","acceptedAnswer":{"@type":"Answer","text":"The ideal holding period for stocks depends on your investment goals. Some may prefer short-term trading to make quick profits, while others aim for long-term investing, allowing their investments to grow over time."}},{"@type":"Question","name":"Should I invest when the market is down?","acceptedAnswer":{"@type":"Answer","text":"Investing when the market is down, also known as buying the dip, can be a good strategy if you believe the companies you're investing in have strong long-term prospects. Be cautious and ensure you're not making impulsive decisions based solely on short-term market fluctuations."}},{"@type":"Question","name":"What are Top Gainers and Top Losers?","acceptedAnswer":{"@type":"Answer","text":"Top Gainers are the stocks that have experienced the highest percentage increase in prices during a specific period. On the other hand, Top Losers are the stocks that have experienced the biggest percentage decrease in their prices during the same period."}},{"@type":"Question","name":"How can I interpret the Detailed Stock Analysis?","acceptedAnswer":{"@type":"Answer","text":"The Detailed Stock Analysis provides in-depth information about a particular stock's performance. It includes data on historical price trends, trading volume, market capitalization, and more. This information can enable you to make informed decisions about investing or trading in a specific stock."}},{"@type":"Question","name":"How do I access the Detailed Stock Analysis for a specific stock?","acceptedAnswer":{"@type":"Answer","text":"Explore the Detailed Stock Analysis by clicking on the stock's name or symbol in the list of gainers and losers. You can also utilize the search function on our homepage. This feature will lead you to a page with comprehensive information about that particular stock."}},{"@type":"Question","name":"Is this information suitable for beginners?","acceptedAnswer":{"@type":"Answer","text":"Yes, the information is designed to be user-friendly and accessible for investors of all levels, including beginners. Our goal is to provide valuable insights minus the technical jargon."}},{"@type":"Question","name":"Can I track these stocks over different time ranges?","acceptedAnswer":{"@type":"Answer","text":"Certainly! Our platform provides options to view stock performance over various time frames, from a day to several years. You can make well-informed decisions based on trends and historical performance."}}]}</script><!--$!--><template data-dgst="NEXT_DYNAMIC_NO_SSR_CODE"></template><div class="fixed w-[100vw] h-[100vh] bg-white"></div><!--/$--><script src="js/webpack-8e364bf7f355cd4d.js" async=""></script><script src="js/87bc1fd9-4f947a18f5aadc1a.js" async=""></script><script src="js/5801-ae3a0f89cb3715a2.js" async=""></script><script src="js/main-app-fe11fa67451e5ab5.js" async=""></script><script>(self.__next_f=self.__next_f||[]).push([0])</script><script>self.__next_f.push([1,"1:HL[\"/_next/static/css/abcc7e8bc98882ac.css\",{\"as\":\"style\"}]\n0:\"$L2\"\n"])</script><script>self.__next_f.push([1,"3:HL[\"/_next/static/css/33a5544f7ef295a7.css\",{\"as\":\"style\"}]\n"])</script><script>self.__next_f.push([1,"4:I{\"id\":\"68802\",\"chunks\":[\"2272:static/chunks/webpack-8e364bf7f355cd4d.js\",\"2704:static/chunks/87bc1fd9-4f947a18f5aadc1a.js\",\"5801:static/chunks/5801-ae3a0f89cb3715a2.js\"],\"name\":\"\",\"async\":false}\n6:I{\"id\":\"14299\",\"chunks\":[\"2272:static/chunks/webpack-8e364bf7f355cd4d.js\",\"2704:static/chunks/87bc1fd9-4f947a18f5aadc1a.js\",\"5801:static/chunks/5801-ae3a0f89cb3715a2.js\"],\"name\":\"\",\"async\":false}\n2:[[[\"$\",\"link\",\"0\",{\"rel\":\"stylesheet\",\"href\":\"/_next/static/css/abcc7e8bc98882ac.css\",\"precedence\":\"next\"}]],[\"$\","])</script><script>self.__next_f.push([1,"\"$L4\",null,{\"buildId\":\"drErdRm2L3HxAVdjvuFN7\",\"assetPrefix\":\"\",\"initialCanonicalUrl\":\"/\",\"initialTree\":[\"\",{\"children\":[\"__PAGE__\",{}]},\"$undefined\",\"$undefined\",true],\"initialHead\":[\"$L5\",[\"$\",\"meta\" ouslySetInnerHTML\":{\"__html\":\"{\\\"@context\\\":\\\"https://schema.org\\\",\\\"@type\\\":\\\"Organization\\\",\\\"name\\\":\\\"Lemonn\\\",\\\"url\\\":\\\"https://lemonn.co.in/\\\",\\\"logo\\\":\\\"https://lemonn.co.in/icons/stocks/lemonn.svg\\\",\\\"description\\\":\\\"Invest in stocks, MF, F\u0026Os \u0026 IPOs. Lemonn's zero-commission trading platform makes it easy to grow your wealth. TRADE NOW!!\\\",\\\"founder\\\":[\\\"Ashish Singhal\\\",\\\"Vimal Sagar Tiwari\\\",\\\"Govind Soni\\\"],\\\"foundingDate\\\":\\\"2024\\\",\\\"foundingLocation\\\":\\\"Mumbai, Maharashtra, India\\\",\\\"address\\\":{\\\"@type\\\":\\\"PostalAddress\\\",\\\"streetAddress\\\":\\\"Galaxy, Unit No. 603, A Wing, Everest Grand, Mahakali Caves Road, Opp. Ahura Centre, Andheri East, Chakala Midc\\\",\\\"addressLocality\\\":\\\"Mumbai\\\",\\\"addressRegion\\\":\\\"Maharashtra\\\",\\\"postalCode\\\":\\\"400093\\\",\\\"addressCountry\\\":\\\"IN\\\"},\\\"contactPoint\\\":[{\\\"@type\\\":\\\"ContactPoint\\\",\\\"telephone\\\":\\\"+918035769929\\\",\\\"contactType\\\":\\\"customer service\\\",\\\"areaServed\\\":\\\"IN\\\",\\\"availableLanguage\\\":[\\\"English\\\",\\\"Hindi\\\"]}],\\\"sameAs\\\":[\\\"https://x.com/LemonnHQ\\\",\\\"https://www.instagram.com/lemonnhq/\\\",\\\"https://www.youtube.com/@LemonnHQ\\\",\\\"https://www.facebook.com/lemonnhq/\\\",\\\"https://www.linkedin.com/company/lemonnhq/\\\"]}\"}}],[\"$\",\"script\",null,{\"type\":\"application/ld+json\",\"dangerouslySetInnerHTML\":{\"__html\":\"{\\\"@context\\\":\\\"https://schema.org\\\",\\\"@type\\\":\\\"FAQPage\\\",\\\"mainEntity\\\":[{\\\"@type\\\":\\\"Question\\\",\\\"name\\\":\\\"What are stocks?\\\",\\\"acceptedAnswer\\\":{\\\"@type\\\":\\\"Answer\\\",\\\"text\\\":\\\"Stocks, also known as shares or equities, represent ownership in a company. When you buy stocks of a company, you become a shareholder, which means you own a tiny piece of that company.\\\"}},{\\\"@type\\\":\\\"Question\\\",\\\"name\\\":\\\"Why do stock prices go up and down?\\\",\\\"acceptedAnswer\\\":{\\\"@type\\\":\\\"Answer\\\",\\\"text\\\":\\\"Stock prices move based on a variety of factors. Positive news about a company, industry, or the economy can boost prices. Negative news or uncertain events can cause prices to drop. Additionally, supply and demand play a role; if more people want to buy a stock, its price will rise and vice versa.\\\"}},{\\\"@type\\\":\\\"Question\\\",\\\"name\\\":\\\"Why do stock prices go up and down?\\\",\\\"acceptedAnswer\\\":{\\\"@type\\\":\\\"Answer\\\",\\\"text\\\":\\\"Sensex and Nifty are two popular stock market indices in India. Sensex tracks the performance of 30 large and well-established companies, while Nifty tracks the performance of 50 such companies. These indices give us a bird’s eye view of the stock market’s performance.\\\"}},{\\\"@type\\\":\\\"Question\\\",\\\"name\\\":\\\"Is investing in stocks risky?\\\",\\\"acceptedAnswer\\\":{\\\"@type\\\":\\\"Answer\\\",\\\"text\\\":\\\"Yes, investing in stocks comes with risks. Stock prices can be volatile. There is a chance of losing money, especially in the short term. However, historically, the stock market tends to provide higher returns over the long term when compared to other investment options.\\\"}},{\\\"@type\\\":\\\"Question\\\",\\\"name\\\":\\\"How do I choose which stocks to buy?\\\",\\\"acceptedAnswer\\\":{\\\"@type\\\":\\\"Answer\\\",\\\"text\\\":\\\"Do your research! A few factors to monitor could include: a company's financial health, its management, its products or services, and its competition. It's also a good idea to diversify your investments by buying stocks from different industries, so if one industry faces a setback, your entire investment won't be affected.\\\"}},{\\\"@type\\\":\\\"Question\\\",\\\"name\\\":\\\"What is a dividend?\\\",\\\"acceptedAnswer\\\":{\\\"@type\\\":\\\"Answer\\\",\\\"text\\\":\\\"A dividend is a portion of a company's profits paid to its shareholders. Not all companies pay dividends, but those that do often distribute them regularly, such as quarterly or annually.\\\"}},{\\\"@type\\\":\\\"Question\\\",\\\"name\\\":\\\"How long should I hold onto my stocks?\\\",\\\"acceptedAnswer\\\":{\\\"@type\\\":\\\"Answer\\\",\\\"text\\\":\\\"The ideal holding period for stocks depends on your investment goals. Some may prefer short-term trading to make quick profits, while others aim for long-term investing, allowing their investments to grow over time.\\\"}},{\\\"@type\\\":\\\"Question\\\",\\\"name\\\":\\\"Should I invest when the market is down?\\\",\\\"acceptedAnswer\\\":{\\\"@type\\\":\\\"Answer\\\",\\\"text\\\":\\\"Investing when the market is down, also known as buying the dip, can be a good strategy if you believe the companies you're investing in have strong long-term prospects. Be cautious and ensure you're not making impulsive decisions based solely on short-term market fluctuations.\\\"}},{\\\"@type\\\":\\\"Question\\\",\\\"name\\\":\\\"What are Top Gainers and Top Losers?\\\",\\\"acceptedAnswer\\\":{\\\"@type\\\":\\\"Answer\\\",\\\"text\\\":\\\"Top Gainers are the stocks that have experienced the highest percentage increase in prices during a specific period. On the other hand, Top Losers are the stocks that have experienced the biggest percentage decrease in their prices during the same period.\\\"}},{\\\"@type\\\":\\\"Question\\\",\\\"name\\\":\\\"How can I interpret the Detailed Stock Analysis?\\\",\\\"acceptedAnswer\\\":{\\\"@type\\\":\\\"Answer\\\",\\\"text\\\":\\\"The Detailed Stock Analysis provides in-depth information about a particular stock's performance. It includes data on historical price trends, trading volume, market capitalization, and more. This information can enable you to make informed decisions about investing or trading in a specific stock.\\\"}},{\\\"@type\\\":\\\"Question\\\",\\\"name\\\":\\\"How do I access the Detailed Stock Analysis for a specific stock?\\\",\\\"acceptedAnswer\\\":{\\\"@type\\\":\\\"Answer\\\",\\\"t
