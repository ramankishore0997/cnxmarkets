<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Navy rounded square background -->
  <rect width="180" height="180" rx="40" fill="#0B1929"/>

  <!-- Rising bar 1 (left, shortest) -->
  <rect x="28" y="116" width="28" height="36" rx="7" fill="#FFFFFF"/>

  <!-- Rising bar 2 (center, medium) -->
  <rect x="76" y="88" width="28" height="64" rx="7" fill="#FFFFFF"/>

  <!-- Rising bar 3 (right, tallest) -->
  <rect x="124" y="56" width="28" height="96" rx="7" fill="#FFFFFF"/>

  <!-- Blue trend line connecting bar tops -->
  <polyline
    points="42,116 90,88 138,56"
    stroke="#1F77B4" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"
    fill="none"/>

  <!-- Live dot at rightmost bar top -->
  <circle cx="138" cy="56" r="11" fill="#1F77B4"/>
  <circle cx="138" cy="56" r="5" fill="#FFFFFF"/>
</svg>
